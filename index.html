<script>
// Debug: Find all elements containing "ultimato" or "ingles"
document.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
        const allElements = document.querySelectorAll('*');
        const matches = [];
        
        allElements.forEach(el => {
            if (el.className && el.className.toString().toLowerCase().includes('ultimato') || 
                el.id && el.id.toString().toLowerCase().includes('ultimato') ||
                el.className && el.className.toString().toLowerCase().includes('ingles')) {
                matches.push({
                    element: el,
                    tag: el.tagName,
                    classes: el.className,
                    id: el.id
                });
            }
        });
        
        console.log('Found matching elements:', matches);
        
        // Apply styling to all matches
        matches.forEach(match => {
            match.element.style.marginTop = '50px';
            match.element.style.borderTop = '3px solid red';
            match.element.style.paddingTop = '20px';
        });
    }, 2000); // Wait 2 seconds for timeline to load
});
</script>
