<!DOCTYPE html>
<html>
<head>
 <!-- 1 -->
        <link title="timeline-styles" rel="stylesheet" 
              href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">

        <!-- 2 -->
        <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>
    <style>
     /* Target specific timeline markers in the navigation */
.tl-timenav .tl-timenav-item:nth-child(8) {
    background: red !important;
    border: 3px solid darkred !important;
    transform: scale(1.5) !important;
}

.tl-timenav .tl-timenav-item:nth-child(8) .tl-timenav-item-content {
    background: yellow !important;
    color: black !important;
    font-weight: bold !important;
}

/* Make specific marker larger and different color */
.tl-timenav .tl-timenav-item:nth-child(8) .tl-timenav-item-content:after {
    background: #e74c3c !important;
    border: 3px solid #c0392b !important;
    transform: scale(1.3) !important;
}

     .tl-text-group-0 { background: rgba(255,0,0,0.1) !important; }
.tl-text-group-1 { background: rgba(0,255,0,0.1) !important; }
.tl-text-group-2 { background: rgba(0,0,255,0.1) !important; }


#ultimato-ingles-marker .tl-timemarker-content-container {
    background-color: red !important;
    border: 2px solid #c0392b !important;
    padding: 20px !important;
    border-radius: 8px !important;
    color: white !important;
}
    </style>
</head>

        <div id='timeline-embed' style="width: 100%; height: 600px"></div>

        <!-- 3 -->
        <script type="text/javascript">
            // The TL.Timeline constructor takes at least two arguments:
            // the id of the Timeline container (no '#'), and
            // the URL to your JSON data file or Google spreadsheet.
            // the id must refer to an element "above" this code,
            // and the element must have CSS styling to give it width and height
            // optionally, a third argument with configuration options can be passed.
            // See below for more about options.
            timeline = new TL.Timeline('timeline-embed',
            'https://docs.google.com/spreadsheets/d/e/2PACX-1vSx_eQ6iZO9yafvK8i4LZUc0GJDs_I3fcvftPF3nf-kmRYQVLAwZY9O4PKh267HAbQIwZ2qZNobshUv/pubhtml');
        </script>
</html>
