       <script type="text/javascript">
    timeline = new TL.Timeline('timeline-embed',
        'https://docs.google.com/spreadsheets/d/e/2PACX-1vSx_eQ6iZO9yafvK8i4LZUc0GJDs_I3fcvftPF3nf-kmRYQVLAwZY9O4PKh267HAbQIwZ2qZNobshUv/pubhtml',
        {
            language: "pt",
            start_at_end: false,
         zoom_level: 0,
         scale_factor: 0.1,
            timenav_height: 100,
            scale_factor: 1
        }
    );



// Seleciona todos os elementos
const headlines = [
    document.querySelector('#ultimato-ingles-marker .tl-headline.tl-headline-fadeout'),
    document.querySelector('#imperialismo-europeu-marker .tl-headline.tl-headline-fadeout')
];

const contents = [
    document.querySelector('#ultimato-ingles-marker .tl-timemarker-content-container'),
    document.querySelector('#imperialismo-europeu-marker .tl-timemarker-content-container')
];

// Função para aplicar a cor
function applyColor() {
    contents.forEach(content => {
        content.style.backgroundColor = '#fd566b'; // Ex: '#ff0000'
    });
}

// Função para remover a cor
function removeColor() {
    contents.forEach(content => {
        content.style.backgroundColor = '';
    });
}

// Adiciona eventos a todos os elementos de hover
headlines.forEach(headline => {
    headline.addEventListener('mouseenter', applyColor);
    headline.addEventListener('mouseleave', removeColor);
});



        
</script>
